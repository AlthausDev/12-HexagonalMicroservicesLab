services:
  catalog-service:
    build:
      context: .
      dockerfile: 02-microservices/catalog-service/Dockerfile
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12

  order-service:
    build:
      context: .
      dockerfile: 02-microservices/order-service/Dockerfile
    environment:
      CATALOG_BASE_URL: http://catalog-service:8081
    ports:
      - "8082:8082"
    depends_on:
      catalog-service:
        condition: service_healthy
